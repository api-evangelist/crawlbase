description: >-
  FinOps view of Crawlbase spend. Crawlbase bills on a per-request / credit
  usage basis for the Crawling and Scraper APIs, monthly subscription fees for
  its Smart / AI proxy tiers and Cloud Storage tiers, and custom enterprise
  agreements. The dominant cost driver is successful crawl requests: only
  responses with pc_status 200 are charged, and per-request credit cost rises
  with JavaScript rendering (headless Chrome), premium residential routing, and
  scroll processing time. The Leads API bills one credit per ten emails per
  domain. A free trial covers up to 10,000 requests.
notes: >-
  Per-request and per-credit dollar rates are shown in Crawlbase's pricing
  calculator and are not reconciled here. Credit multipliers (JavaScript = 2
  credits, premium = 10, premium + JS = 20 on the Scraper API; Leads = 1 credit
  per 10 emails; scroll billed by processing time) are documented in the product
  references. Verify current rates on https://crawlbase.com/pricing during
  reconciliation.
