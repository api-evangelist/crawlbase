meters:
- name: successful_requests
  description: Crawling API requests that return pc_status 200, billed per request (complexity-based). Failed requests are free.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - token_type
  - complexity
- name: javascript_render_credits
  description: Extra credits consumed when a request is rendered in headless Chrome (JavaScript token).
  unit: credits
  aggregation: sum
  dimensions:
  - account
- name: premium_proxy_credits
  description: Extra credits consumed when a request routes through the premium residential proxy network.
  unit: credits
  aggregation: sum
  dimensions:
  - account
- name: scraper_requests
  description: Scraper API structured-extraction requests, billed per request with credit multipliers for javascript and premium.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - scraper
- name: leads_credits
  description: Leads API email discovery, billed at one credit per ten emails returned per domain.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - domain
- name: storage_subscription
  description: Monthly Cloud Storage subscription fee by tier (Free / Developer / Business / Enterprise).
  unit: subscription
  aggregation: max
  dimensions:
  - account
  - tier
- name: proxy_subscription
  description: Monthly Smart / AI proxy subscription fee by tier (Free / Starter / Advanced / Premium).
  unit: subscription
  aggregation: max
  dimensions:
  - account
  - tier
principles:
- name: Visibility
  description: Track successful (pc_status 200) request volume by token type and complexity; monitor JavaScript and premium credit multipliers separately from plain fetches.
- name: Allocation
  description: Use distinct tokens or sub-accounts per workload/team so crawl spend maps to internal cost centers.
- name: Optimization
  description: Prefer the Normal token for static pages; reserve the JavaScript token and premium routing for pages that truly need them; cap scroll_interval; rely on charge-on-success and async batching; cache via Cloud Storage to avoid re-crawling.
- name: Accountability
  description: Assign owners per token/project; review monthly successful-request and credit burn against plan allowances and budget.
